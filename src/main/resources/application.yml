spring:
  profiles:
    active: ${SPRING_PROFILE:dev}  # padrão é 'dev'

  servlet:
    multipart:
      max-file-size: 1MB      # Limite por arquivo enviado via multipart
      max-request-size: 2MB   # Limite total da requisição multipart

  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.SQLServerDialect
    show-sql: true

springdoc:
  packagesToScan: com.faceid.controller
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html

opencv:
  haarcascade:
    path: classpath:haarcascade_frontalface_alt.xml

app:
  image:
    max-size-bytes: ${IMAGE_MAX_SIZE_BYTES:1048576}
    storage:
      path: ${IMAGE_STORAGE_PATH:./uploads/faces}

jwt:
  # DEV: fallback inseguro apenas para desenvolvimento local.
  # PRODUÇÃO: obrigatório definir JWT_SECRET como variável de ambiente com chave >= 256 bits em Base64.
  # Gerar: openssl rand -base64 32
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h padrão

liveness:
  session:
    ttl-seconds: 45         # Tempo de vida de uma sessão de desafio
    max-frames: 30          # Máximo de frames por sessão
  thresholds:
    sharpness: 0.25         # Variância Laplaciana mínima para considerar "nítido"
    texture: 0.55           # Entropia LBP mínima para considerar "textura real"
    gradient: 0.20          # Magnitude Sobel mínima para considerar "bordas reais"
    liveness: 0.55          # Score geral mínimo para verdict LIVE
    min-head-displacement: 15.0  # Deslocamento mínimo (px) para validar movimento de cabeça

face-registration:
  session:
    ttl-minutes: 5          # Tempo para completar o cadastro multi-ângulo
  required-poses: FRONT,LEFT,RIGHT  # Poses obrigatórias para concluir o cadastro

cors:
  # DEV: localhost. PRODUÇÃO: definir CORS_ALLOWED_ORIGINS com domínios reais.
  # Nunca usar * com allowCredentials=true.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

server:
  tomcat:
    max-http-form-post-size: 2MB   # Limite de form POST
    max-swallow-size: 2MB          # Tomcat para de ler body após 2MB (evita DoS lento)

audit:
  retention-days: ${AUDIT_RETENTION_DAYS:90}  # Purge automático após 90 dias (LGPD)
